name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SEED_URL: https://pub-50e9ef6dfe944ca8aa2288e45f20ba7c.r2.dev/seed-data/ci.sql
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: script_editor_test
      PGUSER: script_editor
      PGPASSWORD: testpassword

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: script_editor
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: script_editor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0   # full history required for migration ordering

      # ── 2. Setup Node ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install & Build ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 3b. Migration validation ─────────────────────────────────────────────
      #
      # CD is the authoritative source of truth for the CI seed. Even if a PR's
      # own CI passed (against an older seed), we re-validate here on merge so
      # that concurrent PRs can never silently ship a stale seed.
      #
      # Flow: detect new migration files → apply old schema → import old seed →
      #       snapshot → run migration → verify invariance → upload new seed.
      # Then the normal build + server-side migration runs as usual.
      - name: Detect new migration files in this push
        id: migrations
        run: |
          FILES=$(git diff HEAD~1 HEAD --name-only --diff-filter=A -- 'db/add-*.sql' 'db/migrate-*.sql')
          if [ -n "$FILES" ]; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "Migration files detected:"
            echo "$FILES"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No new migration files in this push."
          fi

      - name: Write test .env.local
        if: steps.migrations.outputs.has_migrations == 'true'
        run: |
          cat > .env.local <<'EOF'
          PGHOST=localhost
          PGPORT=5432
          PGDATABASE=script_editor_test
          PGUSER=script_editor
          PGPASSWORD=testpassword
          EOF

      - name: Apply pre-migration schema to test DB
        if: steps.migrations.outputs.has_migrations == 'true'
        run: git show HEAD~1:db/schema.sql | psql -v ON_ERROR_STOP=1

      - name: Download and import old CI seed
        if: steps.migrations.outputs.has_migrations == 'true'
        run: |
          curl -fsSL "$SEED_URL" -o old-seed.sql
          SIZE=$(wc -c < old-seed.sql)
          echo "Downloaded ${SIZE} bytes"
          [ "$SIZE" -ge 1000000 ] || { echo "FAIL: seed file too small"; exit 1; }
          psql -v ON_ERROR_STOP=1 -f old-seed.sql

      - name: Run migration tests (snapshot → migrate → verify invariance)
        if: steps.migrations.outputs.has_migrations == 'true'
        run: npm run test:migration

      - name: Upload new CI seed
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.SEED_R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.SEED_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.SEED_R2_SECRET_ACCESS_KEY }}
          SEED_R2_BUCKET: ${{ secrets.SEED_R2_BUCKET }}
        run: |
          npm run seed:schema
          npm run seed:ci-export -- "我们的星星" "供养2.0"

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build (standalone)
        run: npm run build
        env:
          # Suppress build-time DB connections; env vars come from .env.local at runtime
          SKIP_ENV_VALIDATION: '1'

      # ── 4. Bundle ────────────────────────────────────────────────────────────
      - name: Bundle standalone output
        run: |
          # Next standalone needs static/ and public/ copied in manually
          cp -r .next/static .next/standalone/.next/static
          cp -r public       .next/standalone/public
          tar -czf /tmp/deploy_bundle.tar.gz -C .next/standalone .

      # ── 5. Setup SSH ─────────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Set SSH alias
        run: |
          cat >> ~/.ssh/config <<EOF
          Host prod
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      # ── 6. Upload & Extract ──────────────────────────────────────────────────
      - name: Upload bundle
        run: |
          RELEASE="${{ github.run_number }}-${{ github.sha }}"
          RELEASE="${RELEASE:0:30}"   # keep it short
          RELEASE_DIR="/var/www/production-manager/releases/$RELEASE"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "RELEASE_DIR=$RELEASE_DIR" >> $GITHUB_ENV

          ssh prod "mkdir -p $RELEASE_DIR"
          scp /tmp/deploy_bundle.tar.gz prod:/tmp/deploy_bundle.tar.gz
          ssh prod "tar -xzf /tmp/deploy_bundle.tar.gz -C $RELEASE_DIR && rm /tmp/deploy_bundle.tar.gz"

      # ── 7. Backup DB if migrations pending ──────────────────────────────────
      - name: Backup production DB before migrations
        run: |
          SHARED="/var/www/production-manager/shared"
          ORDERED=$(git log --reverse --diff-filter=A --format="%H" -- 'db/add-*.sql' 'db/migrate-*.sql'             | while read commit; do
                git diff-tree --no-commit-id -r --name-only --diff-filter=A "$commit" -- 'db/add-*.sql' 'db/migrate-*.sql' | sort
              done)
          ssh prod "cat $SHARED/db-applied.txt 2>/dev/null || true" > /tmp/db-applied-backup-check.txt
          PENDING=0
          while IFS= read -r FILEPATH; do
            FILENAME=$(basename "$FILEPATH")
            if [ -f "$FILEPATH" ] && ! grep -qxF "$FILENAME" /tmp/db-applied-backup-check.txt 2>/dev/null; then
              PENDING=$((PENDING + 1))
            fi
          done <<< "$ORDERED"
          if [ "$PENDING" -gt 0 ]; then
            echo "Found $PENDING pending migration(s) — creating production DB backup..."
            BACKUP="pre_migration_${{ github.run_number }}_$(date +%Y%m%d_%H%M%S).pgdump"
            ssh prod "
              mkdir -p $SHARED/backups &&
              sudo -u postgres pg_dump -d script_editor --format=custom --compress=9 -f $SHARED/backups/$BACKUP &&
              ls -lh $SHARED/backups/$BACKUP &&
              ls -1t $SHARED/backups/*.pgdump 2>/dev/null | tail -n +6 | xargs -r rm -f
            "
            echo "Backup saved to $SHARED/backups/$BACKUP"
          else
            echo "No pending migrations — backup skipped."
          fi

      # ── 8. Run DB migrations ───────────────────────────────────────────────
      - name: Run DB migrations
        run: |
          SHARED="/var/www/production-manager/shared"
          DB="script_editor"

          # Get all db/add-*.sql and db/migrate-*.sql files ordered by first-commit date (oldest first),
          # alphabetically within the same commit.
          ORDERED=$(git log --reverse --diff-filter=A --format="%H" -- 'db/add-*.sql' 'db/migrate-*.sql' \
            | while read commit; do
                git diff-tree --no-commit-id -r --name-only --diff-filter=A "$commit" -- 'db/add-*.sql' 'db/migrate-*.sql' | sort
              done)

          if [ -z "$ORDERED" ]; then
            echo "No migration files found."
            exit 0
          fi

          # Fetch the applied manifest from server (empty if not yet created)
          ssh prod "cat $SHARED/db-applied.txt 2>/dev/null || true" > /tmp/db-applied.txt

          echo "Already applied:"
          cat /tmp/db-applied.txt || echo "(none)"

          while IFS= read -r FILEPATH; do
            FILENAME=$(basename "$FILEPATH")
            if grep -qxF "$FILENAME" /tmp/db-applied.txt 2>/dev/null; then
              echo "SKIP  $FILENAME (already applied)"
            elif [ ! -f "$FILEPATH" ]; then
              # File was deleted from the repo (e.g. consolidated into schema.sql).
              # Mark as applied so future runs don't warn about it.
              echo "SKIP  $FILENAME (deleted from repo, marking as applied)"
              ssh prod "echo '$FILENAME' >> $SHARED/db-applied.txt"
              echo "$FILENAME" >> /tmp/db-applied.txt
            else
              echo "APPLY $FILENAME"
              scp "$FILEPATH" prod:/tmp/migration.sql
              ssh prod "sudo -u postgres psql -d $DB -f /tmp/migration.sql && rm /tmp/migration.sql"
              # Record in manifest
              ssh prod "echo '$FILENAME' >> $SHARED/db-applied.txt"
              echo "$FILENAME" >> /tmp/db-applied.txt
            fi
          done <<< "$ORDERED"

      # ── 8. Swap symlink & reload PM2 ─────────────────────────────────────────
      - name: Activate release
        run: |
          ssh prod "
            ln -snf ${{ env.RELEASE_DIR }} /var/www/production-manager/current &&
            pm2 reload /var/www/production-manager/shared/ecosystem.config.js --update-env
          "

      # ── 9. Clean up old releases (keep latest 5) ─────────────────────────────
      - name: Clean old releases
        run: |
          ssh prod "
            ls -1dt /var/www/production-manager/releases/*/ |
            tail -n +6 |
            xargs rm -rf --
          "
