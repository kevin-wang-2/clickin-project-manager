name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  unit-test:
    runs-on: ubuntu-latest
    env:
      SEED_URL: https://pub-50e9ef6dfe944ca8aa2288e45f20ba7c.r2.dev/seed-data/ci.sql
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: script_editor_test
      PGUSER: script_editor
      PGPASSWORD: testpassword

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: script_editor
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: script_editor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4.2.2

      # Fetch the base branch tip so we can detect new migration files and
      # restore the pre-migration schema for the migration test path.
      - name: Fetch base branch
        run: git fetch --depth=1 origin $GITHUB_BASE_REF

      # Detect db/add-*.sql or db/migrate-*.sql files that are NEW in this PR
      # (not yet on the base branch). These are static migrations that will be
      # applied to existing production data at deploy time.
      - name: Detect DDL migration files in this PR
        id: migrations
        run: |
          FILES=$(git diff origin/$GITHUB_BASE_REF HEAD --name-only --diff-filter=A -- 'db/add-*.sql' 'db/migrate-*.sql')
          if [ -n "$FILES" ]; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            printf 'files<<EOF\n%s\nEOF\n' "$FILES" >> $GITHUB_OUTPUT
            echo "Migration files detected:"
            echo "$FILES"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No new migration files in this PR."
          fi

      # ── Schema application (two paths) ──────────────────────────────────────
      #
      # MIGRATION PATH: Apply the base-branch schema so we can test that the
      # migration files work correctly on real pre-migration data.
      - name: Apply base schema (migration path)
        if: steps.migrations.outputs.has_migrations == 'true'
        run: git show origin/$GITHUB_BASE_REF:db/schema.sql | psql

      # NORMAL PATH: Fresh install from the current schema (no new migrations).
      - name: Apply current schema (normal path)
        if: steps.migrations.outputs.has_migrations != 'true'
        run: psql -f db/schema.sql

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write test .env.local
        run: |
          cat > .env.local <<'EOF'
          PGHOST=localhost
          PGPORT=5432
          PGDATABASE=script_editor_test
          PGUSER=script_editor
          PGPASSWORD=testpassword
          EOF

      # ── Step 1: Seed data — static validation + DB import ─────────────────
      - name: Validate seed SQL (static)
        run: |
          curl -fsSL "$SEED_URL" -o demo.sql
          SIZE=$(wc -c < demo.sql)
          echo "Downloaded ${SIZE} bytes"
          [ "$SIZE" -ge 1000000 ] || { echo "FAIL: file too small"; exit 1; }

          # Verify seed schema hash.
          # The seed embeds "-- schema-hash: <sha256>" written by seed:ci-export.
          #
          # MIGRATION PATH: the seed must match the BASE schema (it was exported
          # before this PR's DDL changes). We derive the expected hash from the
          # base branch's schema.sql rather than from the current commit's, so the
          # check is stable across rebases and does not depend on commit SHAs.
          #
          # NORMAL PATH: the seed must match the CURRENT schema.
          if [ "${{ steps.migrations.outputs.has_migrations }}" = "true" ]; then
            EXPECTED_HASH=$(git show origin/$GITHUB_BASE_REF:db/schema.sql | sha256sum | awk '{print $1}')
            HASH_CONTEXT="base schema (pre-migration)"
          else
            EXPECTED_HASH=$(sha256sum db/schema.sql | awk '{print $1}')
            HASH_CONTEXT="current schema"
          fi

          SEED_HASH=$(grep -m1 '^-- schema-hash: ' demo.sql | awk '{print $3}')
          if [ -z "$SEED_HASH" ]; then
            echo "FAIL: seed has no schema-hash header — re-run: npm run seed:ci-export"
            exit 1
          fi
          if [ "$EXPECTED_HASH" != "$SEED_HASH" ]; then
            echo "FAIL: seed schema hash mismatch (seed is stale, expected $HASH_CONTEXT)"
            echo "  expected: $EXPECTED_HASH"
            echo "  seed has: $SEED_HASH"
            echo "  Re-run: npm run seed:ci-export -- \"供养2.0\" \"我们的星星\""
            exit 1
          fi
          echo "OK  schema hash ($HASH_CONTEXT): $EXPECTED_HASH"

          FAIL=0
          for NAME in "供养2.0" "我们的星星"; do
            grep -qF "$NAME" demo.sql && echo "OK  $NAME" || { echo "FAIL  $NAME missing"; FAIL=1; }
          done
          for ID in mod1uc2dg mon0jcm82; do
            grep -qF "'${ID}'" demo.sql && echo "OK  $ID" || { echo "FAIL  $ID missing"; FAIL=1; }
          done

          check_inserts() {
            COUNT=$(grep -c "^INSERT INTO \"$1\"" demo.sql || true)
            [ "$COUNT" -ge "$2" ] && echo "OK  $1: ${COUNT}" || { echo "FAIL  $1: ${COUNT} < $2"; FAIL=1; }
          }
          check_inserts production 2
          check_inserts version    4
          check_inserts scene      100
          check_inserts script     5000
          check_inserts cue        10

          grep -qP '\$[0-9]+' demo.sql && { echo "FAIL: \$N placeholders in SQL"; exit 1; } || echo "OK  no placeholders"
          grep -q "UPDATE production SET active_version_id" demo.sql && echo "OK  active_version_id restore" || { echo "FAIL  missing restore"; FAIL=1; }
          grep -q "UPDATE tag_group SET" demo.sql                     && echo "OK  tag_group restore"        || { echo "FAIL  missing restore"; FAIL=1; }
          exit $FAIL

      - name: Import seed data into test DB
        run: npm run seed:demo

      # MIGRATION PATH: Apply the new migration files to the imported pre-migration
      # data. This is the same sequence that will run on production at deploy time.
      - name: Apply PR migration files
        if: steps.migrations.outputs.has_migrations == 'true'
        run: |
          echo '${{ steps.migrations.outputs.files }}' | while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Applying $f ..."
            psql -f "$f"
          done

      # MIGRATION PATH: Verify that the migration left the data in a consistent
      # state: no orphan FK references and key row counts preserved.
      - name: Verify post-migration data integrity
        if: steps.migrations.outputs.has_migrations == 'true'
        run: |
          FAIL=0
          chk() {
            TABLE=$1; WHERE=$2; MIN=$3
            N=$(psql -t -A -c "SELECT COUNT(*) FROM \"${TABLE}\" WHERE ${WHERE}")
            [ "$N" -ge "$MIN" ] && echo "OK  ${TABLE}: ${N}" || { echo "FAIL  ${TABLE}: ${N} < ${MIN}"; FAIL=1; }
          }
          chk production "id IN ('mod1uc2dg','mon0jcm82')"                                                             2
          chk version    "production_id = 'mod1uc2dg'"                                                                 2
          chk scene      "production_id IN ('mod1uc2dg','mon0jcm82')"                                                 100
          chk script     "production_id IN ('mod1uc2dg','mon0jcm82')"                                                5000

          # Check that no FK references are dangling (every child has a parent).
          FK_ORPHANS=$(psql -t -A <<'EOSQL'
            SELECT COUNT(*) FROM (
              SELECT c.conname, c.conrelid::regclass AS child_table
              FROM pg_constraint c
              JOIN pg_class p ON p.oid = c.confrelid
              WHERE c.contype = 'f'
                AND NOT EXISTS (
                  SELECT 1
                  FROM pg_inherits i
                  WHERE i.inhrelid = c.conrelid
                )
                AND c.convalidated = false
            ) orphans
          EOSQL
          )
          [ "${FK_ORPHANS:-0}" -eq 0 ] && echo "OK  no dangling FK constraints" || { echo "FAIL  ${FK_ORPHANS} unvalidated FK constraints after migration"; FAIL=1; }
          exit $FAIL

      - name: Verify seeded DB
        run: |
          FAIL=0
          chk() {
            TABLE=$1; WHERE=$2; MIN=$3
            N=$(psql -t -A -c "SELECT COUNT(*) FROM \"${TABLE}\" WHERE ${WHERE}")
            [ "$N" -ge "$MIN" ] && echo "OK  ${TABLE}: ${N}" || { echo "FAIL  ${TABLE}: ${N} < ${MIN}"; FAIL=1; }
          }
          chk production "id IN ('mod1uc2dg','mon0jcm82')"                                                              2
          chk version    "production_id = 'mod1uc2dg'"                                                                  2
          chk scene      "production_id IN ('mod1uc2dg','mon0jcm82')"                                                  100
          chk scene_version "version_id IN (SELECT id FROM version WHERE production_id IN ('mod1uc2dg','mon0jcm82'))"   50
          chk script     "production_id IN ('mod1uc2dg','mon0jcm82')"                                                 5000
          chk cue        "cue_list_id IN (SELECT id FROM cue_list WHERE production_id IN ('mod1uc2dg','mon0jcm82'))"    10

          NULL_COUNT=$(psql -t -A -c "SELECT COUNT(*) FROM production WHERE id IN ('mod1uc2dg','mon0jcm82') AND active_version_id IS NULL")
          [ "$NULL_COUNT" -eq 0 ] && echo "OK  active_version_id restored" || { echo "FAIL  ${NULL_COUNT} production(s) have NULL active_version_id"; FAIL=1; }
          exit $FAIL

      # ── Step 2: Unit tests ────────────────────────────────────────────────────
      - name: Run unit tests
        run: npm test
